<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOMA — Your Story</title>
<link rel="stylesheet" href="story.css">
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- CHAPTER SELECT VIEW -->
<div id="view-chapters">
  <div id="story-header">
    <a href="home.html" class="back-btn">← Home</a>
    <div class="story-logo">⚔️ Your Story</div>
    <div id="story-xp-pill">0 XP</div>
  </div>
  <div id="chapters-body">
    <div class="loading-wrap"><div class="loader-ring"></div></div>
  </div>
</div>

<!-- ACTIVE EPISODE VIEW (camera + tracking) -->
<div id="view-episode" class="hidden">

  <!-- Episode HUD header -->
  <div id="ep-header">
    <button id="ep-abandon-btn">✕ Abandon</button>
    <div id="ep-hud-center">
      <div id="ep-title-hud">Episode</div>
      <div id="ep-goal-hud">Goal: <span id="ep-goal-current">0</span> / <span id="ep-goal-target">10</span></div>
    </div>
    <div id="ep-xp-badge">+0 XP</div>
  </div>

  <!-- Progress bar -->
  <div id="ep-progress-bar"><div id="ep-progress-fill"></div></div>

  <!-- Camera stage -->
  <div id="ep-stage">
    <video id="ep-video" playsinline autoplay muted></video>
    <canvas id="ep-canvas"></canvas>
    <div id="ep-loading">
      <div class="loader-ring"></div>
      <div id="ep-loading-text">loading…</div>
    </div>
  </div>

  <!-- Rep counter -->
  <div id="ep-rep-panel">
    <div id="ep-rep-count">0</div>
    <div id="ep-rep-label">reps</div>
    <div id="ep-phase-txt">PHASE: —</div>
    <div class="phase-bar"><div id="ep-phase-fill"></div></div>
    <div id="ep-live-angle">—</div>
    <div id="ep-live-label">tracking</div>
  </div>

  <!-- Save button (appears when goal met) -->
  <button id="ep-save-btn" class="hidden" onclick="">COMPLETE EPISODE →</button>

</div>

<!-- EPISODE COMPLETE OVERLAY -->
<div id="view-complete" class="hidden">
  <div class="complete-box">
    <div class="complete-emoji">🏆</div>
    <div class="complete-title">Episode Complete!</div>
    <div class="complete-ep-name" id="complete-ep-name"></div>
    <div class="complete-stats">
      <div class="cstat"><div class="cstat-val" id="complete-reps">0</div><div class="cstat-lbl">Reps Done</div></div>
      <div class="cstat"><div class="cstat-val" id="complete-xp">+0</div><div class="cstat-lbl">XP Earned</div></div>
    </div>
    <button class="complete-next-btn" id="complete-next-btn">Next Episode →</button>
    <button class="complete-home-btn" id="complete-home-btn">← Back to Story</button>
  </div>
</div>

<script src="story.js"></script>
</body>
</html>

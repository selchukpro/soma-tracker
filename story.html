<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOMA — Your Story</title>
<link rel="stylesheet" href="story.css">
</head>
<body>

<!-- CHAPTER SELECT VIEW -->
<div id="view-chapters">
  <div id="story-header">
    <a href="home.html" class="back-btn">← Home</a>
    <div class="story-logo">⚔️ Your Story</div>
    <div id="story-xp-pill">0 XP</div>
  </div>
  <div id="chapters-body">
    <div class="loading-wrap"><div class="loader-ring"></div></div>
  </div>
</div>

<!-- ACTIVE EPISODE VIEW -->
<div id="view-episode" class="hidden">

  <div id="ep-header">
    <button id="ep-abandon-btn">✕ Abandon</button>
    <div id="ep-hud-center">
      <div id="ep-title-hud">Episode</div>
    </div>
    <div id="ep-xp-badge">+0 XP</div>
  </div>

  <!-- MONSTER SECTION -->
  <div id="ep-monster-wrap">
    <div id="ep-monster-emoji">🐉</div>
    <div id="ep-monster-name">Dragon</div>
    <div id="ep-monster-hp-bar">
      <div id="ep-monster-hp-fill"></div>
    </div>
    <div id="ep-monster-hp-text">50 HP</div>
  </div>

  <!-- Camera stage -->
  <div id="ep-stage">
    <video id="ep-video" playsinline autoplay muted></video>
    <canvas id="ep-canvas"></canvas>
    <div id="ep-loading">
      <div class="loader-ring"></div>
      <div id="ep-loading-text">loading…</div>
    </div>
  </div>

  <!-- Rep panel -->
  <div id="ep-rep-panel">
    <div id="ep-rep-count">0</div>
    <div id="ep-rep-label">hits</div>
    <div style="width:1px;height:28px;background:var(--border);"></div>
    <div id="ep-phase-txt">PHASE: —</div>
    <div class="phase-bar"><div id="ep-phase-fill"></div></div>
    <div style="width:1px;height:28px;background:var(--border);"></div>
    <div id="ep-live-angle">—</div>
    <div id="ep-live-label">tracking</div>
  </div>

</div>

<!-- CLEARED VIEW -->
<div id="view-cleared" class="hidden">
  <div class="cleared-box">
    <div class="cleared-burst">💥</div>
    <div class="cleared-badge">YOU CLEARED THE EPISODE</div>
    <div class="cleared-ep-title" id="cleared-ep-title"></div>
    <div class="cleared-monster" id="cleared-ep-name"></div>
    <div class="cleared-stats">
      <div class="cstat"><div class="cstat-val" id="cleared-reps">0</div><div class="cstat-lbl">Reps Done</div></div>
      <div class="cstat"><div class="cstat-val" id="cleared-xp">+0</div><div class="cstat-lbl">XP Earned</div></div>
    </div>
    <button class="cleared-continue-btn" id="cleared-continue-btn">Continue →</button>
  </div>
</div>

<!-- Scripts at bottom to avoid blocking render -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script src="story.js"></script>
<script>
  // Continue button → back to story chapter list
  document.getElementById('cleared-continue-btn').addEventListener('click', () => {
    showView('chapters');
    renderChapters();
  });
</script>
</body>
</html>

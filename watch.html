<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOMA — Watch Room</title>
<link rel="stylesheet" href="watch.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- LOBBY VIEW -->
<div id="view-lobby">
  <div id="lobby-header">
    <a href="home.html" class="back-btn">← Home</a>
    <div class="watch-logo">👥 Watch Room</div>
  </div>

  <div id="lobby-body">
    <div class="lobby-section">
      <div class="lobby-title">Create a Room</div>
      <div class="lobby-sub">Share the code with friends — they'll see your skeleton live</div>
      <button class="primary-btn" id="create-room-btn">Create Room</button>
    </div>

    <div class="lobby-divider">or</div>

    <div class="lobby-section">
      <div class="lobby-title">Join a Room</div>
      <div class="lobby-sub">Enter a 6-character room code</div>
      <div class="code-input-wrap">
        <input id="room-code-input" type="text" placeholder="ABC123" maxlength="6" autocomplete="off" spellcheck="false">
        <button class="primary-btn" id="join-room-btn">Join</button>
      </div>
      <div id="join-error" class="join-error"></div>
    </div>

    <div class="lobby-section" id="recent-rooms-section" style="display:none;">
      <div class="lobby-title">Recent Rooms</div>
      <div id="recent-rooms-list"></div>
    </div>
  </div>
</div>

<!-- ROOM VIEW -->
<div id="view-room" class="hidden">
  <div id="room-header">
    <button class="back-btn" id="leave-room-btn">✕ Leave</button>
    <div id="room-header-center">
      <div id="room-name-display">Room</div>
      <div id="room-code-display" title="Tap to copy">CODE: ······</div>
    </div>
    <div id="room-member-count">0 online</div>
  </div>

  <!-- Multi-skeleton canvas -->
  <div id="room-stage">
    <canvas id="room-canvas"></canvas>
    <div id="room-empty">
      <div class="room-empty-icon">🏃</div>
      <div class="room-empty-text">Waiting for members…</div>
      <div class="room-empty-sub">Share the room code so friends can join</div>
      <div id="room-share-code"></div>
      <button class="copy-btn" id="copy-code-btn">Copy Code</button>
    </div>
  </div>

  <!-- Member list -->
  <div id="member-bar"></div>

  <!-- Your own stream controls -->
  <div id="stream-controls">
    <div id="stream-status">
      <div id="stream-dot"></div>
      <span id="stream-status-text">Not streaming</span>
    </div>
    <a id="go-train-btn" class="stream-btn" href="index.html">🏋️ Train &amp; Stream</a>
  </div>
</div>

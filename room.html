<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOMA — Room</title>
<link rel="stylesheet" href="room.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.2.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
</head>
<body>

<!-- ── VIEW: HOME ── -->
<div id="view-home">
  <div class="top-bar">
    <a href="home.html" class="back-btn">← Home</a>
    <div class="page-title">⚡ Rooms</div>
    <div id="home-user-pill">···</div>
  </div>

  <div class="home-body">
    <button class="big-btn accent" id="create-btn">+ Create Room</button>

    <div class="divider">or join</div>

    <div class="join-row">
      <input id="join-input" type="text" placeholder="Room code" maxlength="6" autocomplete="off" spellcheck="false">
      <button class="big-btn" id="join-btn">Join</button>
    </div>
    <div id="join-err" class="err-msg"></div>

    <div id="recent-section" style="display:none;">
      <div class="section-label">Recent Rooms</div>
      <div id="recent-list"></div>
    </div>
  </div>
</div>

<!-- ── VIEW: LOBBY ── -->
<div id="view-lobby" class="hidden">
  <div class="top-bar">
    <button class="back-btn" id="leave-btn">✕ Leave</button>
    <div class="room-code-display" id="lobby-code">······</div>
    <button class="copy-btn" id="copy-btn">Copy</button>
  </div>

  <div class="lobby-body">
    <div class="lobby-title">Waiting for players…</div>
    <div class="lobby-sub" id="lobby-sub">Share the room code with friends</div>

    <div id="members-list"></div>

    <div class="lobby-actions">
      <button class="big-btn accent" id="ready-btn">✓ I'm Ready</button>
      <div id="start-wrap" style="display:none;">
        <button class="big-btn start-btn" id="start-btn">▶ START SESSION</button>
      </div>
    </div>

    <div class="lobby-hint">
      Session starts when all members are ready and host presses Start
    </div>
  </div>
</div>

<!-- ── VIEW: SESSION (live skeleton arena) ── -->
<div id="view-session" class="hidden">
  <!-- Session header -->
  <div id="session-header">
    <div id="session-timer">00:00</div>
    <div id="session-exercise">GET READY</div>
    <button id="end-session-btn">End</button>
  </div>

  <!-- Multi-skeleton canvas -->
  <div id="arena">
    <canvas id="arena-canvas"></canvas>
    <!-- My camera (hidden — only used for tracking) -->
    <video id="my-video" playsinline autoplay muted style="display:none;"></video>
    <canvas id="my-canvas" style="display:none;"></canvas>
    <!-- Loading -->
    <div id="arena-loading">
      <div class="loader-ring"></div>
      <div id="arena-loading-text">Starting cameras…</div>
    </div>
  </div>

  <!-- Rep scoreboard -->
  <div id="scoreboard"></div>
</div>
